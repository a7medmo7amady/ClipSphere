/api/v1/watch-history:
  post:
    tags: [Watch History]
    summary: Log a watch history event for the authenticated user
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LogWatchRequest'
    responses:
      '201':
        description: Watch history logged
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Missing/invalid token
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '404':
        description: Video not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
