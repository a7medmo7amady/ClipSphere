/api/v1/users/me:
  get:
    tags: [Users]
    summary: Get currently authenticated user profile
    security:
      - bearerAuth: []
    responses:
      '200':
        description: User profile
      '401':
        description: Missing/invalid token
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/users/updateMe:
  patch:
    tags: [Users]
    summary: Update current user profile fields
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateUserRequest'
    responses:
      '200':
        description: User updated
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Missing/invalid token
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/users/me/preferences:
  patch:
    tags: [Users]
    summary: Update notification preferences for current user
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdatePreferencesRequest'
    responses:
      '200':
        description: Preferences updated
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Missing/invalid token
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/users/{id}:
  get:
    tags: [Users]
    summary: Get user profile by ID
    security: []
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    responses:
      '200':
        description: Public user profile
      '404':
        description: User not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/users/{id}/follow:
  post:
    tags: [Users]
    summary: Follow a user
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    responses:
      '200':
        description: Followed successfully
      '401':
        description: Missing/invalid token
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/users/{id}/unfollow:
  delete:
    tags: [Users]
    summary: Unfollow a user
    security:
      - bearerAuth: []
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    responses:
      '200':
        description: Unfollowed successfully
      '401':
        description: Missing/invalid token
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/users/{id}/followers:
  get:
    tags: [Users]
    summary: List followers for a user
    security: []
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    responses:
      '200':
        description: Followers list

/api/v1/users/{id}/following:
  get:
    tags: [Users]
    summary: List users followed by a user
    security: []
    parameters:
      - $ref: '#/components/parameters/UserIdParam'
    responses:
      '200':
        description: Following list
