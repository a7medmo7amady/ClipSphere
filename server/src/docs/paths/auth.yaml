/api/v1/auth/register:
  post:
    tags: [Auth]
    summary: Register a new user
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegisterRequest'
    responses:
      '201':
        description: Registered successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                token:
                  type: string
                data:
                  type: object
                  properties:
                    user:
                      $ref: '#/components/schemas/PublicUser'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '409':
        description: Duplicate value (e.g. email)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/api/v1/auth/login:
  post:
    tags: [Auth]
    summary: Authenticate a user
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LoginRequest'
    responses:
      '200':
        description: Logged in successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                data:
                  type: object
                  properties:
                    user:
                      $ref: '#/components/schemas/PublicUser'
      '400':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
      '401':
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'
